services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tienda_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - mysql
    networks:
      - tienda_network

  nginx:
    image: nginx:alpine
    container_name: tienda_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - tienda_network

  mysql:
    image: mysql:8.4
    container_name: tienda_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: tienda_ropa
      MYSQL_USER: laravel
      MYSQL_PASSWORD: root
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - tienda_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: tienda_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    depends_on:
      - mysql
    networks:
      - tienda_network

  mailpit:
    image: axllent/mailpit
    container_name: tienda_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - tienda_network

networks:
  tienda_network:
    driver: bridge

volumes:
  mysql_data: